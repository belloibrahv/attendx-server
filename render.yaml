services:
  - type: web
    name: attendx-api
    env: node
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: AUTO_REGISTER
        value: true
      - key: FACE_PROVIDER
        value: mock